name: Release

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write

jobs:
    build:
        name: Build (${{ matrix.os }})
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: windows-latest
                      out_dir: ./bin/win32/x64
                      artifact_glob: "*.zip"
                      package_script: package-win-ci
                      release_suffix: win-x64.zip
                    - os: macos-latest
                      out_dir: ./bin/mac/x64
                      artifact_glob: "*.dmg"
                      package_script: package-mac
                      release_suffix: mac-x64.dmg
                    - os: ubuntu-latest
                      out_dir: ./bin/linux/x64
                      artifact_glob: "*.AppImage"
                      package_script: package-linux
                      release_suffix: linux-x64.AppImage
        runs-on: ${{ matrix.os }}

        steps:
            - uses: actions/checkout@v4

            - name: Setup pnpm
              # No explicit version here: pnpm/action-setup auto-detects the
              # version from the packageManager field in package.json
              # (pnpm@10.17.1). Specifying it in both places makes the action
              # fail with ERR_PNPM_BAD_PM_VERSION.
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "pnpm"

            - name: Read app version
              id: version
              shell: bash
              run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build
              run: pnpm run build

            - name: Package
              run: pnpm run ${{ matrix.package_script }}
              env:
                  # Make sure electron-builder never tries to auto-publish to
                  # GitHub releases during packaging (every package script
                  # also passes -p never, but keep GH_TOKEN unset as a guard).
                  GH_TOKEN: ""

            # Find the built artifact by glob in electron-builder's output dir.
            # We don't hardcode the filename because electron-builder's naming
            # (productName-version-arch.ext) varies and has changed across
            # versions; globbing the extension is robust.
            - name: Resolve artifact
              id: artifact
              shell: bash
              run: |
                  set -eu
                  # shell glob below is intentionally unquoted
                  shopt -s nullglob
                  mapfile -t matches < <(ls -t ${{ matrix.out_dir }}/${{ matrix.artifact_glob }} 2>/dev/null)
                  if [ ${#matches[@]} -eq 0 ]; then
                      echo "::error::No ${{ matrix.artifact_glob }} found in ${{ matrix.out_dir }}"
                      ls -la ${{ matrix.out_dir }} || true
                      exit 1
                  fi
                  ARTIFACT="${matches[0]}"
                  echo "Found artifact: $ARTIFACT"
                  echo "path=$ARTIFACT" >> "$GITHUB_OUTPUT"
                  echo "suffix=${{ matrix.release_suffix }}" >> "$GITHUB_OUTPUT"

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: build-${{ matrix.os }}
                  path: ${{ steps.artifact.outputs.path }}
                  if-no-files-found: error

    release:
        name: Publish release
        needs: build
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Read app version
              id: version
              shell: bash
              run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

            - name: Download all artifacts
              uses: actions/download-artifact@v4
              with:
                  path: assets
                  merge-multiple: true

            - name: List artifacts
              shell: bash
              run: ls -la assets

            - name: Rename artifacts
              shell: bash
              run: |
                  set -eu
                  VERSION="${{ steps.version.outputs.version }}"
                  cd assets
                  # Rename each downloaded file to the canonical release name.
                  for f in *; do
                      case "$f" in
                          *.zip) mv -v "$f" "Simple.Reader.${VERSION}.win-x64.zip" ;;
                          *.dmg) mv -v "$f" "Simple.Reader.${VERSION}.mac-x64.dmg" ;;
                          *.AppImage) mv -v "$f" "Simple.Reader.${VERSION}.linux-x64.AppImage" ;;
                      esac
                  done

            - name: Create GitHub release
              uses: softprops/action-gh-release@v2
              with:
                  name: Simple Reader v${{ steps.version.outputs.version }}
                  tag_name: ${{ github.ref_name }}
                  draft: true
                  prerelease: false
                  generate_release_notes: true
                  files: |
                      assets/*
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
