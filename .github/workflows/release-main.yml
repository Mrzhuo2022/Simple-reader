name: Release

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write

jobs:
    build:
        name: Build (${{ matrix.os }})
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: windows-latest
                      out_dir: ./bin/win32/x64
                      artifact_paths: |
                        ./bin/win32/x64/*.zip
                        ./bin/win32/x64/*.exe
                      package_script: package-win-ci
                    - os: macos-latest
                      out_dir: ./bin/darwin/x64
                      artifact_paths: |
                        ./bin/darwin/x64/*.dmg
                      package_script: package-mac
                    - os: ubuntu-latest
                      out_dir: ./bin/linux/x64
                      artifact_paths: |
                        ./bin/linux/x64/*.AppImage
                      package_script: package-linux
        runs-on: ${{ matrix.os }}

        steps:
            - uses: actions/checkout@v4

            - name: Setup pnpm
              # No explicit version here: pnpm/action-setup auto-detects the
              # version from the packageManager field in package.json
              # (pnpm@10.17.1). Specifying it in both places makes the action
              # fail with ERR_PNPM_BAD_PM_VERSION.
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "pnpm"

            - name: Read app version
              id: version
              shell: bash
              run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build
              run: pnpm run build

            - name: Package
              run: pnpm run ${{ matrix.package_script }}
              env:
                  # Make sure electron-builder never tries to auto-publish to
                  # GitHub releases during packaging (every package script
                  # also passes -p never, but keep GH_TOKEN unset as a guard).
                  GH_TOKEN: ""

            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: build-${{ matrix.os }}
                  path: ${{ matrix.artifact_paths }}
                  if-no-files-found: error

    release:
        name: Publish release
        needs: build
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Read app version
              id: version
              shell: bash
              run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

            - name: Download all artifacts
              uses: actions/download-artifact@v4
              with:
                  path: assets
                  merge-multiple: true

            - name: List artifacts
              shell: bash
              run: |
                  echo "Artifact directory: $(pwd)/assets"
                  ls -la assets || true

            - name: Skip release if no artifacts
              shell: bash
              run: |
                  set -eu
                  if [ -z "$(find assets -maxdepth 1 -type f | head -n 1)" ]; then
                      echo "No artifacts found, skipping release."
                      exit 0
                  fi

            - name: Rename artifacts
              shell: bash
              run: |
                  set -eu
                  VERSION="${{ steps.version.outputs.version }}"
                  cd assets
                  for f in *; do
                      case "$f" in
                          *.zip) mv -v "$f" "Simple.Reader.${VERSION}.win-x64.zip" ;;
                          *.exe) mv -v "$f" "Simple.Reader.${VERSION}.win-x64.exe" ;;
                          *.dmg) mv -v "$f" "Simple.Reader.${VERSION}.mac-x64.dmg" ;;
                          *.AppImage) mv -v "$f" "Simple.Reader.${VERSION}.linux-x64.AppImage" ;;
                          *) echo "Keeping artifact unchanged: $f" ;;
                      esac
                  done

            - name: Create GitHub release
              uses: softprops/action-gh-release@v2
              with:
                  name: Simple Reader v${{ steps.version.outputs.version }}
                  tag_name: ${{ github.ref_name }}
                  draft: false
                  prerelease: false
                  generate_release_notes: true
                  files: |
                      assets/*.zip
                      assets/*.exe
                      assets/*.dmg
                      assets/*.AppImage
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
